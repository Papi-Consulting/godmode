# GodMode Project Config

project:
  name: GodMode
  default_branch: main

harness:
  agents_file: AGENTS.md
  spec_file: docs/spec.md
  product_spec_file: docs/godmode-v1-product-spec.md
  architecture_dir: docs/architecture
  conventions_dir: docs/conventions
  review_dir: docs/review
  friction_dir: docs/friction

# Workspace isolation for builder/fix sessions (issue #41).
#   shared   - builder works directly in the operated-project checkout (default).
#   worktree - each run gets its own git worktree (sibling .godmode-worktrees/),
#              so an agent can't disturb the running app's checkout. Recommended
#              for dogfooding; see docs/architecture/run-worktree-isolation.md.
workspace:
  isolation: shared

# Automatic review/fix loop controller (issue #39). All conservative-by-default:
#   auto        - false keeps every stage operator-triggered (regression-safe).
#                 true lets the controller chain reviewer launch -> synthesis ->
#                 fix handoff -> re-verification -> re-review once a run has a
#                 verified PR.
#   autoSendFix - false keeps fix-handoff send behind explicit operator approval
#                 even in auto mode (recommended). true auto-sends only when the
#                 builder session is live and the prompt fully resolves.
#   maxCycles   - the fix-cycle budget surfaced here (state machine stays the
#                 authority). See docs/architecture/review-fix-loop.md.
loop:
  auto: false
  autoSendFix: false
  maxCycles: 3

roles:
  head:
    agent: hermes
    pane: head
    display_name: Hermes
  builder:
    agent: claude-code
    pane: builder
    display_name: Claude Code
  reviewers:
    - id: reviewer-a
      agent: codex
      pane: reviewer_a
      display_name: Codex A
      role_doc: docs/review/reviewer-a-correctness.md
    - id: reviewer-b
      agent: codex
      pane: reviewer_b
      display_name: Codex B
      role_doc: docs/review/reviewer-b-architecture.md

workflow:
  auto_start_reviewers_after_pr: true
  auto_send_blockers_to_builder: true
  max_fix_cycles: 3
  auto_merge: false

agents:
  hermes:
    adapter: cli
    command: hermes
    mode: interactive
  claude-code:
    adapter: cli
    command: claude
    mode: interactive
  codex:
    adapter: cli
    # Non-interactive Codex path: runs the prompt to completion and exits, so a
    # one-shot reviewer auto-posts on completion. Plain `codex` opens the
    # interactive CLI and never returns.
    command: codex exec
    mode: oneshot
